name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # Deployments NICHT abbrechen, sondern in die Warteschlange stellen. Sonst
  # lehnt das GitHub-Pages-Backend bei schnell aufeinanderfolgenden Pushes ein
  # abgebrochenes Deployment mit "Deployment failed, try again later." ab.
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      # Bei schnell aufeinanderfolgenden Pushes lehnt das GitHub-Pages-Backend
      # ein Deployment gelegentlich mit "Deployment failed, try again later."
      # ab, weil das vorherige Deployment intern noch nicht abgeschlossen ist.
      # Deshalb: erster Versuch darf scheitern, kurz warten, dann erneut.
      - id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: Warte vor erneutem Deploy-Versuch
        if: steps.deployment.outcome == 'failure'
        run: sleep 45
      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
